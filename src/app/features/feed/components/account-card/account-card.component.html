<div class="bg-white p-8 rounded-2xl shadow-lg border border-gray-100 mb-6">

  <div class="flex justify-between items-start">

    <div>
      <p class="text-sm text-gray-400 uppercase tracking-wider font-semibold">
        Account Number
      </p>

      <h3 class="text-lg font-mono text-gray-800">
        {{ accountNumber }}
      </h3>
    </div>

    <div class="bg-mainColor/10 p-3 rounded-xl">
      <i class="fa-solid fa-wallet text-mainColor text-xl"></i>
    </div>

  </div>

  <div class="mt-8">
    <p class="text-sm text-gray-500">Available Balance</p>

    <h2 class="text-4xl font-bold text-gray-900">
      ${{ balance }}
    </h2>
  </div>

  <button
    (click)="sendMoney.emit()"
    class="mt-8 w-full md:w-auto bg-mainColor text-white font-bold py-3 px-8 rounded-xl">

    Send Money
  </button>

</div>
